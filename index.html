<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velvet Rouge Roulette</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="casino-shell">
      <section class="dealer-panel" aria-label="ディーラー">
        <div class="dealer-frame" id="dealerFrame">
          <img id="dealerImage" src="assets/dealer-idle.png" alt="ルーレットのディーラー" />
        </div>
        <div class="dealer-message" id="dealerMessage" aria-live="polite">
          いらっしゃいませ。赤か黒を選び、100円単位でベットしてください。
        </div>
      </section>

      <section class="game-table" aria-label="ルーレットテーブル">
        <header class="table-header">
          <p class="eyebrow">Private Salon</p>
          <h1>Velvet Rouge Roulette</h1>
          <div class="balance-card">
            <span>所持金</span>
            <strong id="balance">100,000円</strong>
          </div>
        </header>

        <div class="roulette-stage">
          <div class="pointer" aria-hidden="true"></div>
          <div class="roulette-wheel" id="rouletteWheel" aria-label="ルーレット">
            <div class="wheel-center">
              <span id="resultLabel">READY</span>
            </div>
          </div>
        </div>

        <form class="bet-panel" id="betForm">
          <div class="choice-group" aria-label="ベット先">
            <button class="choice red-choice" type="button" data-choice="red" aria-pressed="false">
              <span>赤</span>
            </button>
            <button class="choice black-choice" type="button" data-choice="black" aria-pressed="false">
              <span>黒</span>
            </button>
          </div>

          <label class="bet-input">
            <span>ベット額</span>
            <input id="betAmount" type="number" min="100" step="100" inputmode="numeric" placeholder="例: 1000" />
          </label>

          <div class="actions">
            <button class="spin-button" id="spinButton" type="submit">ルーレットを回す</button>
            <button class="reset-button" id="resetButton" type="button">再スタート</button>
          </div>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
